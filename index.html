<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuriFuri Battle</title>
    <!-- QRコード生成用ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; max-width: 400px; margin: 10px auto; }
        #qr-code { display: flex; justify-content: center; margin: 20px 0; }
        .player-box { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        button { background: #00f2ff; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ホスト画面 -->
    <div id="host-area" style="display:none;">
        <h1>ホスト管理画面</h1>
        <div class="card">
            <div id="qr-code"></div>
            <p>スマホで読み取って参加！</p>
            <button onclick="startAll()">一斉にゲーム開始</button>
        </div>
        <div class="card" id="rank-board"></div>
    </div>

    <!-- プレイヤー画面 -->
    <div id="player-area" class="card" style="display:none;">
        <h2>プレイヤー</h2>
        <input type="text" id="roomId" placeholder="ルームID">
        <input type="text" id="username" placeholder="名前">
        <button onclick="joinGame()">参加</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbZzTMvUkG2LXIGY4ux0KBTmnAdqP236s",
            authDomain: "game-4f2d9.firebaseapp.com",
            databaseURL: "https://game-4f2d9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "game-4f2d9",
            storageBucket: "game-4f2d9.firebasestorage.app",
            messagingSenderId: "574316347824",
            appId: "1:574316347824:web:cf686040628e25ad615675"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const isHost = window.location.search.includes('host');

        if (isHost) {
            document.getElementById('host-area').style.display = 'block';
            new QRCode(document.getElementById("qr-code"), window.location.origin + window.location.pathname);
            
            onValue(ref(db, 'game'), (snapshot) => {
                const data = snapshot.val() || {};
                const stage = data.stage; // 'start', 'hidden', 'end'
                const players = data.players || {};
                
                let html = "<h3>ランキング</h3>";
                Object.entries(players).forEach(([name, d]) => {
                    let scoreText = (stage === 'hidden') ? "???" : d.score;
                    html += `<div class="player-box"><span>${name}</span> <b>${scoreText}回</b></div>`;
                });
                document.getElementById('rank-board').innerHTML = html;
            });
        } else {
            document.getElementById('player-area').style.display = 'block';
        }

        window.startAll = () => {
            const duration = 10; // 全員10秒固定
            update(ref(db, 'game'), { stage: 'start' });
            setTimeout(() => update(ref(db, 'game'), { stage: 'hidden' }), 3000); // 3秒後に隠す
            setTimeout(() => update(ref(db, 'game'), { stage: 'end' }), duration * 1000);
        };

        window.joinGame = async () => {
            const name = document.getElementById('username').value;
            if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
            
            window.addEventListener('devicemotion', (e) => {
                const {x, y, z} = e.accelerationIncludingGravity;
                if (Math.abs(x) + Math.abs(y) + Math.abs(z) > 25) {
                    update(ref(db, 'game/players/' + name), { score: parseInt(Math.random()*100) }); // デモ用ランダム
                }
            });
        };
    </script>
</body>
</html>
