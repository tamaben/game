<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FuriFuri Battle - Host</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .screen { display: none; }
        #qr-container { display: flex; justify-content: center; margin: 20px 0; }
        .btn-start { background: #ff0055; color: white; padding: 20px 50px; border-radius: 50px; font-size: 2rem; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ホスト画面 -->
    <div id="host-view" class="screen">
        <h1 id="room-display">ルーム準備中...</h1>
        <div id="setup-stage">
            <div id="qr-container"></div>
            <button class="btn-start" onclick="startGame()">ゲームスタート！</button>
        </div>
        <div id="game-stage" style="display:none;">
            <h2 id="timer-status">戦闘開始！</h2>
            <div id="rank-board"></div>
        </div>
    </div>

    <!-- プレイヤー画面 -->
    <div id="player-view" class="screen">
        <h2>参加画面</h2>
        <input type="text" id="username" placeholder="ニックネーム" style="padding:15px;"><br><br>
        <button onclick="joinGame()">参加する</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = { /* ここに設定 */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const isHost = params.has('host');
        let roomId = params.get('room');

        if (isHost) {
            // 自動でルームIDを作成
            roomId = "room_" + Math.random().toString(36).substr(2, 6);
            document.getElementById('host-view').style.display = 'block';
            document.getElementById('room-display').innerText = "ルームID: " + roomId;
            
            // ルームID付きのURLをQR化
            const joinUrl = window.location.origin + window.location.pathname + "?room=" + roomId;
            new QRCode(document.getElementById("qr-container"), joinUrl);

            onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
                const data = snapshot.val() || {};
                if (data.status === 'playing') {
                    document.getElementById('setup-stage').style.display = 'none';
                    document.getElementById('game-stage').style.display = 'block';
                }
                
                let html = "";
                Object.entries(data.players || {}).forEach(([name, d]) => {
                    let score = (data.showScores || data.status === 'end') ? d.score : "???";
                    html += `<h3>${name}: ${score}回</h3>`;
                });
                document.getElementById('rank-board').innerHTML = html;
            });
        } else if (roomId) {
            document.getElementById('player-view').style.display = 'block';
        }

        window.startGame = () => {
            update(ref(db, `rooms/${roomId}`), { status: 'playing', showScores: true });
            setTimeout(() => update(ref(db, `rooms/${roomId}`), { showScores: false }), 3000);
            setTimeout(() => update(ref(db, `rooms/${roomId}`), { status: 'end', showScores: true }), 10000);
        };

        window.joinGame = async () => {
            const name = document.getElementById('username').value;
            if (!name) return;
            if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
            
            document.body.innerHTML = "<h1>ゲーム中！振れ！</h1>";
            let count = 0;
            window.addEventListener('devicemotion', (e) => {
                const {x, y, z} = e.accelerationIncludingGravity;
                if (Math.abs(x) + Math.abs(y) + Math.abs(z) > 25) {
                    count++;
                    update(ref(db, `rooms/${roomId}/players/${name}`), { score: count });
                }
            });
        };
    </script>
</body>
</html>
