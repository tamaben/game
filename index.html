<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Debug Mode</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        .visible { display: block !important; }
    </style>
</head>
<body>
    <div id="debug-info" style="color: yellow; border: 1px solid yellow; padding: 10px;">
        読み込み開始中...
    </div>

    <!-- ホスト画面（強制表示テスト） -->
    <div id="host-view" style="display:none; border: 2px solid green; padding: 20px;">
        <h1>ホスト画面は表示されています！</h1>
        <div id="qr-box"></div>
    </div>

    <script type="module">
        console.log("スクリプト開始");
        const debug = document.getElementById('debug-info');
        
        try {
            // URLパラメータのチェック
            const isHost = window.location.search.includes('host');
            debug.innerText = "URLパラメータチェック: host=" + isHost;

            if (isHost) {
                document.getElementById('host-view').style.display = 'block';
                debug.innerText += " -> ホスト表示設定完了";
            } else {
                debug.innerText += " -> ホストではないため非表示";
            }
        } catch (e) {
            debug.innerText = "エラー発生: " + e.message;
            console.error(e);
        }
    </script>
</body>
</html>
