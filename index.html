<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuriFuri Battle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; max-width: 400px; margin: 20px auto; }
        input { background: #334155; border: none; padding: 12px; color: white; border-radius: 8px; width: 80%; margin: 10px 0; }
        button { background: #00f2ff; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; color: black; font-weight: bold; }
        .player-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <!-- ホスト画面 -->
    <div id="host-view" style="display:none;">
        <h1>ホスト管理画面</h1>
        <div class="card">
            <div id="qrcode"></div>
            <p>スマホでスキャンして参加！</p>
        </div>
        <div class="card" id="rankings"><h3>ランキング</h3></div>
    </div>

    <!-- 参加者画面 -->
    <div id="player-view" class="card" style="display:none;">
        <h2>参加画面</h2>
        <p id="room-display"></p>
        <input type="text" id="username" placeholder="ニックネームを入力">
        <button onclick="joinGame()">参加する</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = { /* ここにあなたの設定を貼り付け */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const roomId = params.get('room') || "main-room";
        const isHost = params.has('host');

        if (isHost) {
            document.getElementById('host-view').style.display = 'block';
            // QRコードのURLを生成 (roomパラメータ付き)
            const joinUrl = window.location.origin + window.location.pathname + "?room=" + roomId;
            new QRCode(document.getElementById("qrcode"), joinUrl);

            onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
                const data = snapshot.val() || {};
                let html = "<h3>ランキング</h3>";
                Object.entries(data).forEach(([name, d]) => {
                    html += `<div class="player-row"><span>${name}</span> <b>${d.score}回</b></div>`;
                });
                document.getElementById('rankings').innerHTML = html;
            });
        } else {
            document.getElementById('player-view').style.display = 'block';
            document.getElementById('room-display').innerText = "ルーム: " + roomId;
        }

        window.joinGame = async () => {
            const name = document.getElementById('username').value;
            if (!name) return alert("名前を入力して下さい");
            
            // センサー許可＆ゲームロジック
            if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
            
            let count = 0;
            window.addEventListener('devicemotion', (e) => {
                const {x, y, z} = e.accelerationIncludingGravity;
                if (Math.abs(x) + Math.abs(y) + Math.abs(z) > 25) {
                    count++;
                    update(ref(db, `rooms/${roomId}/${name}`), { score: count });
                }
            });
            document.body.innerHTML = "<h2>ゲーム開始！振れ！</h2>";
        };
    </script>
</body>
</html>
